litert:
  model_file: "~/.saltpepper/models/gemma-4-E2B-it.litertlm"
  hf_repo: "litert-community/gemma-4-E2B-it-litert-lm"
  classify_timeout: 5
  chat_timeout: 120

routing:
  # Confidence floors — mirrors spicerack.yaml escalation thresholds
  local_confidence_floor: 0.72   # below this, LOCAL → FAST
  fast_confidence_floor:  0.65   # below this, FAST  → MED
  med_confidence_floor:   0.60   # below this, MED   → HIGH

session:
  save: true
  max_history_for_context: 5   # turns passed to Claude prompt

pricing:
  # Per million tokens (USD) — kept in sync with spicerack.yaml
  opus:   {input: 5.0,  output: 25.0}
  sonnet: {input: 3.0,  output: 15.0}
  haiku:  {input: 1.0,  output:  5.0}
  gemma:  {input: 0.0,  output:  0.0}
